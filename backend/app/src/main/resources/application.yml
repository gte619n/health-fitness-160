spring:
  application:
    name: health-fitness-backend
  threads:
    virtual:
      enabled: true

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

spring.cloud.gcp:
  project-id: health-fitness-160
  firestore:
    project-id: health-fitness-160

# IMPL-02: backend validates Google ID tokens against accounts.google.com.
# `allowed-audiences` is the CSV of the three OAuth client IDs (web, android
# phone, android wear). `dev-mode` is hard-gated to application-test.yml.
app:
  auth:
    allowed-audiences: ${OAUTH_ALLOWED_AUDIENCES:}
    dev-mode: false
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
