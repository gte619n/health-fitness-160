spring:
  cloud:
    gcp:
      core:
        enabled: false
      firestore:
        enabled: false
      secretmanager:
        enabled: false
  autoconfigure:
    exclude:
      - com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration
      - com.google.cloud.spring.autoconfigure.core.environment.StackdriverEnvironmentPostProcessor
      - com.google.cloud.spring.autoconfigure.firestore.GcpFirestoreAutoConfiguration
      - com.google.cloud.spring.autoconfigure.firestore.GcpFirestoreEmulatorAutoConfiguration
      - com.google.cloud.spring.autoconfigure.secretmanager.GcpSecretManagerAutoConfiguration

# IMPL-02 dev-mode bypass. Accepts X-Dev-User in place of a Google JWT.
# Only enabled here — production application.yml hard-codes dev-mode: false.
app:
  auth:
    dev-mode: true
    allowed-audiences: test-audience
  cors:
    allowed-origins: http://localhost:3000
