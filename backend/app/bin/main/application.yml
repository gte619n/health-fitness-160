spring:
  application:
    name: health-fitness-backend
  threads:
    virtual:
      enabled: true
  security:
    # Disable form login + basic auth by default; OAuth2 client is wired in but
    # inert. IMPL-XX (login flow) will configure SecurityFilterChain explicitly.
    oauth2:
      client:
        registration: {}

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

spring.cloud.gcp:
  project-id: health-fitness-160
  firestore:
    project-id: health-fitness-160
